      "M-CHAT-R/F UYGULA (18-24 ay arası altın yaş)",
      "18. ay sağlam çocuk",
      "Aşı: 5'li 4, OPA 4, Hep A 2",
      "Demir + Hb kontrolü"
    ],
    pearls: [
      "M-CHAT-R 18 ayda mutlaka uygula. Pozitif (≥3 risk) → follow-up interview (M-CHAT-R/F), gerekirse erken müdahale yönlendir.",
      "Erken müdahale (özel eğitim, davranışsal) ASD'de uzun dönem sonuçları belirgin değiştirir.",
      "Konuşma gecikmesi: <10 kelime + 2 kelimeli kombinasyon yok → konuşma terapisi konsültasyonu.",
      "Sembolik oyun yok + işaret yok + joint attention yok = klasik üçlü, ASD için yüksek risk."
    ]
  },
  "24": {
    label: "24 ay",
    headline: "50+ kelime, 2 kelimeli cümle",
    subhead: "Anlaşılırlık formülü: yaş(yıl)/4 = aile için",
    domains: {
      "Kaba motor": ["İyi koşar", "Merdiven çıkar (iki ayağı aynı basamağa)", "Top tekmeler", "Sandalyeye tırmanır"],
      "İnce motor": ["6-7 küp üst üste", "Dikey çizgi taklit", "Kapı/kapak açar", "Kaşığı/çatalı kullanır"],
      "Dil — reseptif": ["2 basamak komut yapar", "İsimlendirme zenginleşir", "Soru anlama başlar"],
      "Dil — ekspresif": ["50+ KELİME", "2 KELİMELİ CÜMLELER (anne su ver)", "Anlaşılırlık ~%50 (aile için)"],
      "Sosyal-duygusal": ["Yan yana oyun (parallel play)", "Kendini ifade eder", "Sahiplik duygusu ('benim')", "Tuvalet eğitimi başlangıcı (hazırlık işaretleri)"],
      "Bilişsel": ["Cisim sürekliliği tam", "Basit problem çözme", "Renk/şekil eşleştirme başlangıcı"]
    },
    reflexes: null,
    redFlags: [
      "<50 KELİME, 2 kelimeli cümle yok → konuşma terapisi",
      "Anlaşılırlık <%25",
      "Sembolik oyun yok",
      "Sosyal etkileşim zayıf",
      "Persistan EKOLALİ",
      "Regresyon",
      "Tırmanma/koşma yok → motor değerlendirme"
    ],
    screening: [
      "M-CHAT-R/F (yapılmadıysa)",
      "24. ay sağlam çocuk",

      "ASQ-3"
    ],
    pearls: [
      "Anlaşılırlık formülü: yaş(yıl)/4 = aile için anlaşılma oranı; yabancı için yaş/4 - 1. 2 yaşta aile %50, yabancı %25.",
      "'Late talker' vs 'language disorder' ayrımı: late talker'da anlama normal, ekspresif gerilik var. Disorder'da reseptif de etkili.",
      "Persistan ekolali (papağan gibi tekrar) ASD için tipik.",
      "2 yaşta tuvalet eğitimi BAŞLANGIÇ — zorlama yok. Hazırlık işaretleri: kuru kalma süresi, ifade etme, iletişim becerileri.",
      "Bu yaşta 'kelime sayısı + cümle yapısı + anlaşılırlık' üçlüsü dil gelişiminin omurgasıdır."

};

const ages = ["1", "2", "4", "6", "9", "12", "15", "18", "24"];

const domainIcons = {
  "Kaba motor": "activity",
  "İnce motor": "hand",
  "Dil — reseptif": "ear",
  "Dil — ekspresif": "message-circle",
  "Sosyal-duygusal": "users",
  "Bilişsel": "brain"
};

let selectedAge = "1";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAgeSelector() {
  const container = document.getElementById("age-selector");
  container.innerHTML = ages.map(a => {
    const isSel = a === selectedAge;
    const cls = isSel
      ? "bg-amber-400 text-zinc-950 border-amber-400 shadow-[0_0_20px_rgba(251,191,36,0.25)]"
      : "bg-zinc-900 text-zinc-300 border-zinc-800 hover:border-zinc-700 hover:bg-zinc-800";
    return `<button data-age="${a}" class="age-btn px-4 py-2 rounded-md text-sm font-medium font-mono transition-all whitespace-nowrap border ${cls}">${data[a].label}</button>`;
  }).join("");
  container.querySelectorAll(".age-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedAge = btn.dataset.age;
      renderAll();
    });
  });
}

function sectionTitle(icon, label, accent) {
  const colorMap = { red: "text-red-400", amber: "text-amber-400", default: "text-zinc-400" };
  const color = colorMap[accent] || colorMap.default;
  return `
    <div class="flex items-center gap-2 mb-4">
      <i data-lucide="${icon}" class="w-4 h-4 ${color}"></i>
      <h3 class="text-xs uppercase tracking-[0.15em] text-zinc-400 font-semibold">${escapeHtml(label)}</h3>
      <span class="h-px flex-1 bg-zinc-800/70"></span>
    </div>`;
}

function renderContent() {
  const d = data[selectedAge];
  const main = document.getElementById("content");

  // Hero
  let html = `
    <section class="mb-10 fade-in">
      <div class="flex items-baseline gap-3 mb-2">
        <span class="text-[11px] text-amber-400 uppercase tracking-widest font-mono">${escapeHtml(d.label)}</span>
        <span class="h-px flex-1 bg-zinc-800"></span>
      </div>
      <h2 class="text-3xl sm:text-4xl font-semibold font-display leading-tight mb-2" style="letter-spacing:-0.02em">${escapeHtml(d.headline)}</h2>
      <p class="text-zinc-400 text-base">${escapeHtml(d.subhead)}</p>
    </section>`;

  // Domains
  html += `<section class="mb-10 fade-in">${sectionTitle("activity", "Beklenen Milestone'lar")}<div class="grid sm:grid-cols-2 gap-3">`;
  for (const [domain, items] of Object.entries(d.domains)) {
    const icon = domainIcons[domain] || "activity";
    html += `
      <div class="bg-zinc-900/60 border border-zinc-800 rounded-lg p-4 hover:border-zinc-700 transition-colors">
        <div class="flex items-center gap-2 mb-3 pb-2 border-b border-zinc-800">
          <i data-lucide="${icon}" class="w-4 h-4 text-amber-400/80"></i>
          <h4 class="text-sm font-semibold text-zinc-200">${escapeHtml(domain)}</h4>
        </div>
        <ul class="space-y-1.5">
          ${items.map(it => `<li class="text-sm text-zinc-300 leading-relaxed flex gap-2"><span class="text-amber-400/60 mt-1 text-[8px]">●</span><span>${escapeHtml(it)}</span></li>`).join("")}
        </ul>
      </div>`;
  }
  html += `</div></section>`;

  // Reflexes
  if (d.reflexes && d.reflexes.length > 0) {
    html += `<section class="mb-10 fade-in">${sectionTitle("heart", "Primitif / Postural Refleksler")}
      <div class="bg-zinc-900/60 border border-zinc-800 rounded-lg overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-zinc-900 border-b border-zinc-800">
            <tr>
              <th class="text-left px-4 py-2 text-xs uppercase tracking-wide text-zinc-500 font-medium">Refleks</th>
              <th class="text-left px-4 py-2 text-xs uppercase tracking-wide text-zinc-500 font-medium">Durum / Kaybolma</th>
            </tr>
          </thead>
          <tbody>
            ${d.reflexes.map(r => `<tr class="border-t border-zinc-800/50"><td class="px-4 py-2.5 text-zinc-200 font-medium">${escapeHtml(r.name)}</td><td class="px-4 py-2.5 text-zinc-400 font-mono text-[13px]">${escapeHtml(r.info)}</td></tr>`).join("")}
          </tbody>
        </table>
      </div>
    </section>`;
  }

  // Red Flags
  html += `<section class="mb-10 fade-in">${sectionTitle("alert-triangle", "Kırmızı Bayraklar", "red")}
    <div class="bg-red-950/20 border border-red-900/40 rounded-lg p-4">
      <ul class="space-y-2.5">
        ${d.redFlags.map((f, i) => `<li class="text-sm text-zinc-200 leading-relaxed flex gap-3"><span class="text-red-400 font-mono text-xs mt-0.5 shrink-0">${String(i+1).padStart(2,"0")}</span><span>${escapeHtml(f)}</span></li>`).join("")}
      </ul>
    </div>
  </section>`;

  // Screening
  html += `<section class="mb-10 fade-in">${sectionTitle("stethoscope", "Tarama / Değerlendirme")}
    <div class="bg-zinc-900/60 border border-zinc-800 rounded-lg p-4">
      <ul class="space-y-2">
        ${d.screening.map(s => `<li class="text-sm text-zinc-300 leading-relaxed flex gap-3"><span class="text-sky-400/70 mt-1 text-[8px]">▪</span><span>${escapeHtml(s)}</span></li>`).join("")}
      </ul>
    </div>
  </section>`;

  // Pearls
  html += `<section class="mb-12 fade-in">${sectionTitle("lightbulb", "Klinik İnci", "amber")}
    <div class="space-y-3">
      ${d.pearls.map(p => `<blockquote class="bg-gradient-to-br from-amber-950/30 to-zinc-900/40 border-l-2 border-amber-400/70 rounded-r-md px-4 py-3"><p class="text-sm text-zinc-200 leading-relaxed italic font-display">${escapeHtml(p)}</p></blockquote>`).join("")}
    </div>
  </section>`;

  main.innerHTML = html;
}

function renderAll() {
  renderAgeSelector();
  renderContent();
  if (window.lucide) lucide.createIcons();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener("DOMContentLoaded", renderAll);
</script>
</body>
</html>
